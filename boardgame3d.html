<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💛 우리들의 100 대화 사다리판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kakaoYellow: '#FEE500',
                        kakaoBrown: '#3C1E1E',
                        level1: '#FF6B6B',
                        level2: '#2ECC71',
                        level3: '#9B5DE5'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #191919; color: #fff; }
        .break-keep { word-break: keep-all; }
        
        /* 카카오 사다리 스타일 둥글고 귀여운 버튼 */
        .ladder-step {
            background-color: #252525;
            border: 2px solid #333;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ladder-step:active { transform: scale(0.92); }
        
        /* 레벨별 번호 하단 작은 포인트 바 */
        .indicator-l1 { background-color: #FF6B6B; }
        .indicator-l2 { background-color: #2ECC71; }
        .indicator-l3 { background-color: #9B5DE5; }

        /* 이미 방문(클릭)한 칸 표시 */
        .ladder-step.visited { background-color: #333; border-color: #444; opacity: 0.6; }

        /* 전체화면 대형 모달 애니메이션 */
        .modal-active { display: flex !important; animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>

            </p>

        </div>

        <div class="flex justify-between items-center w-full max-w-xl mx-auto pt-4">

        </div>

            </p>
        </div>

        <div class="w-full max-w-md mx-auto pb-6">
            <button onclick="closeModal()" class="w-full py-4 bg-kakaoYellow hover:bg-[#e5cf00] text-kakaoBrown text-base font-black rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">

            </button>

    </div>

        const l3Descs = ["마음 판에 새겨진 말씀이 내 상황에 어떻게 위로를 주었나요?", "세상 모임과 다르게 우리 소그룹에서만 느끼는 안도감.", "성경 인물의 뚝심이나 순종 중 탐나는 매력.", "인자한 미소, 격려 등 주님이 나를 보시는 눈빛 상상.", "혼자 앓지 않고 지체들이 기도의 힘을 모으고픈 제목.", "모태신앙에서 깨어나거나 뜨겁게 거듭났던 인생의 터닝포인트.", "우연을 가장해 내 필요를 정확히 채우신 최근 은혜.", "서로를 향한 세심한 관찰을 담은 아낌없는 리스펙.", "10년 뒤 나는 공동체의 어떤 든든한 선배가 될까?", "전성기 대비 지금 내 영적 갈급함이나 평안함 수치.", "지나온 삶의 깊은 골짜기에서 주님이 동행해 주신 사연.", "건강, 동역자 등 주님이 거저 주신 위대한 자산.", "교리가 아닌 내 삶 속에서 예수님은 어떤 분이신가요?", "세상 속에서 소금과 빛으로 살아가며 겪는 분투기.", "나 스스로에게 채점해 보는 영적 루틴 상태.", "성경을 읽거나 신앙생활 중 생긴 솔직한 궁금증.", "보이지 않는 곳에서 소그룹원들을 섬기는 즐거운 상상.", "주님이 내게 주신 고유한 재능을 공동체에 녹여내는 법.", "커피 한 잔, 따뜻한 문자 등 사랑을 흘려보낸 기억.", "건물을 넘어 우리 소그룹이 주는 영적 고향의 온기.", "낙심에 빠졌을 때 나를 골방으로 이끄는 하나님의 장치.", "큐티나 설교를 통해 새롭게 다가온 주님의 성품.", "예수님 중심의 가정을 세워나가는 아름다운 청사진.", "성공, 신앙, 가정 등 내 에너지가 쏠리는 진짜 순위.", "먼 훗날 주님 품에 처음 안길 때 던질 첫마디.", "예배 시간 사수 등 주님 앞에 세울 은밀한 다짐.", "십자가 사랑이 내 마음에 진짜로 믿어지기 시작한 날.", "우측 지체의 기도제목을 듣고 전하는 진심 어린 축복.", "내 이정표가 되어주는 단 하나의 평생 말씀 구절.", "내 뜻과 달랐으나 완벽한 때에 길을 여셨던 증거.", "신앙 선배의 궤적을 보며 잠자던 믿음에 불이 붙은 일.", "인간적 서운함을 기도의 골방에서 은혜로 덮어낸 간증.", "날마다 자기를 부인하며 좁은 길을 묵묵히 걸어가는 태도."];

        // 100개 데이터 주입 풀 구성
        for(let i=0; i<100; i++) {
            if(i<35) QUESTIONS_POOL.push({ id:i+1, level:1, icon:'🎈', title:l1Titles[i], desc:l1Descs[i] });
            else if(i<68) QUESTIONS_POOL.push({ id:i+1, level:2, icon:'🌱', title:l2Titles[i-35], desc:l2Descs[i-35] });
            else QUESTIONS_POOL.push({ id:i+1, level:3, icon:'✨', title:l3Titles[i-68], desc:l3Descs[i-68] });
        }

        // ㄹ자 지그재그 수학 정밀 연산식 기반 판 설계 (20줄 5열 구성)
        const totalRows = 20;
        const totalCols = 5;

        function renderKakaoLadderBoard() {
            const gridContainer = document.getElementById('board-grid');
            gridContainer.innerHTML = '';

            // 1부터 100까지 순서 역전 현상을 막기 위한 2차원 매트릭스 행렬 선언
            let mapMatrix = Array.from(Array(totalRows), () => Array(totalCols).fill(0));
            let numSequence = 1;

            // 90 이후를 포함하여 100번 칸까지 한치의 오차도 없이 ㄹ자로 채워지도록 연산합니다.
            for (let r = 0; r < totalRows; r++) {
                if (r % 2 === 0) {
                    // 짝수 행: 좌 -> 우 순서 전진
                    for (let c = 0; c < totalCols; c++) {
                        mapMatrix[r][c] = numSequence++;
                    }
                } else {
                    // 홀수 행: 우 -> 좌 순서 전진 (ㄹ자 스네이크 턴)
                    for (let c = totalCols - 1; c >= 0; c--) {
                        mapMatrix[r][c] = numSequence++;
                    }
                }
            }

            // 구워진 행렬 데이터 기반 엘리먼트 드로우
            for (let r = 0; r < totalRows; r++) {
                for (let c = 0; c < totalCols; c++) {
                    const targetNumber = mapMatrix[r][c];
                    const questionData = QUESTIONS_POOL[targetNumber - 1];
                    
                    const stepBtn = document.createElement('div');
                    stepBtn.id = `step-${targetNumber}`;
                    stepBtn.setAttribute('onclick', `openQuestionModal(${targetNumber})`);
                    
                    // 레벨포인트 컬러 구분 바 클래스 도출
                    let indicatorClass = 'indicator-l1';
                    if (questionData.level === 2) indicatorClass = 'indicator-l2';
                    else if (questionData.level === 3) indicatorClass = 'indicator-l3';

                    stepBtn.className = "ladder-step aspect-square rounded-2xl p-2 flex flex-col justify-between items-center cursor-pointer shadow-inner relative";
                    stepBtn.innerHTML = `
                        <span class="text-xs font-black text-gray-200">${targetNumber}</span>
                        <span class="text-lg my-auto">${questionData.icon}</span>
                        <div class="w-6 h-1 rounded-full ${indicatorClass} opacity-80"></div>
                    `;

                    gridContainer.appendChild(stepBtn);
                }
            }
        }

        // 모달 팝업 크게 열기 함수
        function openQuestionModal(number) {
            const q = QUESTIONS_POOL[number - 1];
            
            const modal = document.getElementById('question-modal');
            const badge = document.getElementById('modal-badge');
            const qNum = document.getElementById('modal-q-num');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');

            // 텍스트 매핑 주입
            qNum.textContent = `NUMBER #${String(number).padStart(3, '0')}`;
            title.textContent = q.title;
            desc.textContent = q.desc;

            // 레벨별 비주얼 강조 포인트 분기 연출
            if (q.level === 1) {
                badge.className = "px-3 py-1 rounded-full text-xs font-black bg-level1 text-white";
                badge.textContent = "LEVEL 1. 아이스브레이킹 🎈";
            } else if (q.level === 2) {
                badge.className = "px-3 py-1 rounded-full text-xs font-black bg-level2 text-white";
                badge.textContent = "LEVEL 2. 소통과 가치관 🌱";
            } else {
                badge.className = "px-3 py-1 rounded-full text-xs font-black bg-level3 text-white";
                badge.textContent = "LEVEL 3. 신앙과 은혜 ✨";
            }

            // 터치한 발판 다녀옴(Visited) 클래스 및 로컬스토리지 상태 영구 기록 활성화
            const activeStep = document.getElementById(`step-${number}`);
            if (activeStep) activeStep.classList.add('visited');
            localStorage.setItem(`visited-step-${number}`, 'true');

            // 화면에 크게 띄우기
            modal.classList.add('modal-active');
        }

        // 다음 버튼 누르면 사라지고 보드판 복귀
        function closeModal() {
            const modal = document.getElementById('question-modal');
            modal.classList.remove('modal-active');
        }

        // 로컬스토리지 및 방문기록 전체 초기화 리셋
        function resetVisited() {
            if (confirm("방문했던 발판 기록을 모두 투명하게 초기화하시겠습니까?")) {
                for (let i = 1; i <= 100; i++) {
                    localStorage.removeItem(`visited-step-${i}`);
                    const step = document.getElementById(`step-${i}`);
                    if (step) step.classList.remove('visited');
                }
            }
        }

        // 로드 시 로컬스토리지에 저장되어 있던 누적 방문 내역 복원 로직
        function loadVisitedState() {
            for (let i = 1; i <= 100; i++) {
                if (localStorage.getItem(`visited-step-${i}`) === 'true') {
                    const step = document.getElementById(`step-${i}`);
                    if (step) step.classList.add('visited');
                }
            }
        }

        // 초기 구동 바인딩
        window.addEventListener('DOMContentLoaded', () => {
            renderKakaoLadderBoard();
            loadVisitedState();
        });
    </script>
