    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { level1: '#FF8A8A', level2: '#4ADE80', level3: '#A78BFA' }

            }

        }

        // 10행 10열 격자판 구조 연산 매핑 (ㄹ자 굽이치기)
        const rows = 10;
        const cols = 10; 

        function drawSnakeBoard() {
            const container = document.getElementById('board-grid');
            container.innerHTML = '';

            let matrix = Array.from(Array(rows), () => Array(cols).fill(0));
            let currentNum = 1;

            // ㄹ자 뱀 모양 궤적 생성식
            for (let r = 0; r < rows; r++) {
                if (r % 2 === 0) {
                    for (let c = 0; c < cols; c++) matrix[r][c] = currentNum++;
                } else {
                    for (let c = cols - 1; c >= 0; c--) matrix[r][c] = currentNum++;
                }
            }

            // HTML 타일 뿌리기
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const qId = matrix[r][c];
                    const qData = QUESTIONS_POOL[qId - 1];
                    const chip = document.createElement('div');
                    chip.id = `chip-${qId}`;
                    chip.setAttribute('onclick', `selectQuestion(${qId})`);
                    
                    // 레벨별 테마 스타일 클래스 매칭
                    let levelClass = '';
                    if (qData.level === 1) levelClass = 'chip-l1';
                    else if (qData.level === 2) levelClass = 'chip-l2';
                    else levelClass = 'chip-l3';

                    chip.className = `talk-chip aspect-square rounded-2xl flex flex-col items-center justify-center cursor-pointer active:scale-95 text-center p-1 font-bold ${levelClass}`;
                    chip.innerHTML = `
                        <span class="text-[9px] opacity-40 font-mono leading-none">${qId}</span>
                        <span class="text-base my-0.5">${qData.icon}</span>
                    `;
                    
                    container.appendChild(chip);
                }
            }
        }

        // 특정 번호 칸 클릭 시 질문 로드 액션
        let lastSelectedId = null;
        function selectQuestion(qId) {
            // 이전에 선택되었던 칩 하이라이트 제거
            if (lastSelectedId) {
                const lastChip = document.getElementById(`chip-${lastSelectedId}`);
                if (lastChip) {
                    const lastData = QUESTIONS_POOL[lastSelectedId - 1];
                    lastChip.className = lastChip.className.replace(/active-l\d/g, '').trim();
                }
            }

            // 현재 선택한 칩 활성화 테마 입히기
            const currentChip = document.getElementById(`chip-${qId}`);
            const q = QUESTIONS_POOL[qId - 1];
            if (currentChip) {
                currentChip.classList.add(`active-l${q.level}`);
            }
            lastSelectedId = qId;

            // 우측 상세 보기 패널 정보 업데이트
            const panel = document.getElementById('question-panel');
            const badge = document.getElementById('panel-badge');
            const qNum = document.getElementById('panel-q-num');
            const title = document.getElementById('panel-title');
            const desc = document.getElementById('panel-desc');

            qNum.textContent = `CHIP #_NUM ${String(q.id).padStart(3, '0')}`;
            title.textContent = q.title;
            desc.textContent = q.desc;
            title.className = "text-base md:text-2xl font-black text-white text-center break-keep leading-snug";

            // 패널 배지 및 테마 경계선 색 변경 연출
            if (q.level === 1) {
                badge.className = "px-2.5 py-0.5 rounded-full text-[10px] font-black bg-level1/20 text-level1 uppercase";

                badge.className = "px-2.5 py-0.5 rounded-full text-[10px] font-black bg-level3/20 text-level3 uppercase";
                badge.textContent = "LEVEL 3. 신앙과 은혜";
                title.className = "text-base md:text-2xl font-black text-amber-200 text-center break-keep leading-snug";
                panel.style.borderColor = "rgba(167,139,250,0.4)";
            }
            
            document.getElementById('panel-header').style.opacity = "1";
        }

        window.addEventListener('DOMContentLoaded', drawSnakeBoard);
