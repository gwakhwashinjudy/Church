<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 대화게임 전용 쌍둥이 주사위</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #191919; color: #fff; overflow: hidden; }
        
        /* 3D 주사위 큐브 공간 연출 */
        .dice-scene { width: 90px; height: 90px; perspective: 400px; }
        .cube {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transition: transform 0.15s linear;
        }
        .cube__face {
            position: absolute; width: 90px; height: 90px; background: #ffffff;
            border: 3px solid #e5e7eb; border-radius: 18px; display: flex; align-items: center;
            justify-content: center; font-size: 36px; font-weight: 900; color: #111827;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.15), 0 10px 25px rgba(0,0,0,0.4);
        }

        /* 3D 주사위 입체 눈금 좌표계 설정 */
        .cube__face--1 { transform: rotateY(  0deg) translateZ(45px); color: #ef4444; font-size: 44px; }
        .cube__face--6 { transform: rotateY(180deg) translateZ(45px); }
        .cube__face--3 { transform: rotateY( 90deg) translateZ(45px); }
        .cube__face--4 { transform: rotateY(-90deg) translateZ(45px); }
        .cube__face--2 { transform: rotateX( 90deg) translateZ(45px); }
        .cube__face--5 { transform: rotateX(-90deg) translateZ(45px); }

        /* 다이내믹 롤링 3축 회전 애니메이션 */
        @keyframes fullRoll {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(720deg) rotateY(1080deg) rotateZ(360deg); }
        }
        .is-rolling { animation: fullRoll 0.7s cubic-bezier(0.25, 1, 0.5, 1) infinite; }

        /* 각 주사위 고유 정지 면 포지션 */
        .show-1 { transform: rotateX(0deg) rotateY(0deg); }
        .show-6 { transform: rotateX(0deg) rotateY(180deg); }
        .show-3 { transform: rotateX(0deg) rotateY(-90deg); }
        .show-4 { transform: rotateX(0deg) rotateY(90deg); }
        .show-2 { transform: rotateX(-90deg) rotateY(0deg); }
        .show-5 { transform: rotateX(90deg) rotateY(0deg); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-6 select-none max-w-md mx-auto">

    <!-- 상단 텍스트 가이드 -->
    <header class="w-full text-center pt-4">
        <h1 class="text-xl font-black tracking-tight text-amber-400"><i class="fa-solid fa-dice mr-1"></i> 주사위 멀티 롤러</h1>
        <p class="text-xs text-gray-400 mt-1">화면 중앙의 주사위나 하단 버튼을 터치하세요</p>
    </header>

    <!-- 중앙부: 주사위 두 개 배치 영역 -->
    <main class="my-auto flex flex-col items-center justify-center gap-12">
        
        <!-- 실시간 합산 결과 스코어 보드 -->
        <div class="bg-[#252525] border border-white/5 px-6 py-3 rounded-2xl text-center shadow-lg min-w-[160px]">
            <div class="text-[10px] text-gray-400 font-bold tracking-wider">TOTAL SCORE</div>
            <div id="total-score" class="text-4xl font-black text-amber-400 mt-0.5">--</div>
        </div>

        <!-- 주사위 2개 컨테이너 -->
        <div class="flex items-center justify-center gap-10 w-full py-4" onclick="rollTwinDice()">
            <!-- 왼쪽 주사위 -->
            <div class="dice-scene">
                <div class="cube show-1" id="cube-left">
                    <div class="cube__face cube__face--1">●</div>
                    <div class="cube__face cube__face--2">··</div>
                    <div class="cube__face cube__face--3">···</div>
                    <div class="cube__face cube__face--4">∷</div>
                    <div class="cube__face cube__face--5">⁙</div>
                    <div class="cube__face cube__face--6">⁛</div>
                </div>
            </div>

            <!-- 오른쪽 주사위 -->
            <div class="dice-scene">
                <div class="cube show-6" id="cube-right">
                    <div class="cube__face cube__face--1">●</div>
                    <div class="cube__face cube__face--2">··</div>
                    <div class="cube__face cube__face--3">···</div>
                    <div class="cube__face cube__face--4">∷</div>
                    <div class="cube__face cube__face--5">⁙</div>
                    <div class="cube__face cube__face--6">⁛</div>
                </div>
            </div>
        </div>

        <!-- 각 주사위의 개별 수치 힌트 정보 파트 -->
        <div id="dice-individual-hint" class="text-sm font-semibold text-gray-400 h-6">
            주사위를 굴릴 준비가 되었습니다.
        </div>

    </main>

    <!-- 하단 원클릭 구동 대형 버튼 -->
    <div class="w-full pb-6">
        <button id="btn-roll" onclick="rollTwinDice()" class="w-full py-4 bg-amber-400 hover:bg-[#e5cf00] text-[#3C1E1E] text-base font-black rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
            <i class="fa-solid fa-dice-five"></i>
            <span>동시에 굴리기</span>
        </button>
    </div>

    <!-- 스크립트 로직 제어 컨트롤러 -->
    <script>
        let isRolling = false;

        function rollTwinDice() {
            if (isRolling) return;
            isRolling = true;

            const cubeLeft = document.getElementById('cube-left');
            const cubeRight = document.getElementById('cube-right');
            const totalScoreText = document.getElementById('total-score');
            const hintText = document.getElementById('dice-individual-hint');
            const btn = document.getElementById('btn-roll');

            // 1. 동작 제어 비활성화 및 구르는 3D 덤블링 애니메이션 클래스 주입
            btn.disabled = true;
            cubeLeft.className = "cube is-rolling";
            cubeRight.className = "cube is-rolling";
            totalScoreText.textContent = "??";
            hintText.textContent = "주사위가 구르는 중...";

            // 2. 0.7초 후 멈추며 최종 입체 눈금 결정
            setTimeout(() => {
                // 각각 1~6 무작위 난수 공식 대입
                const leftVal = Math.floor(Math.random() * 6) + 1;
                const rightVal = Math.floor(Math.random() * 6) + 1;
                const sum = leftVal + rightVal;

                // 회전 구르기 클래스 제거 후 최종 정지면 좌표값 갱신
                cubeLeft.className = `cube show-${leftVal}`;
                cubeRight.className = `cube show-${rightVal}`;

                // 화면 텍스트 전면 업데이트
                totalScoreText.textContent = sum;
                hintText.innerHTML = `왼쪽 주사위 <span class="text-white font-bold">[ ${leftVal} ]</span>  |  오른쪽 주사위 <span class="text-white font-bold">[ ${rightVal} ]</span>`;

                // 제어 권한 복구
                isRolling = false;
                btn.disabled = false;
            }, 700);
        }
    </script>
</body>
</html>
